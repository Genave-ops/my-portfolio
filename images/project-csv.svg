<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg-csv" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="table-head" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="gear-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="arrow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg-csv)" rx="12"/>
  <!-- Subtle grid -->
  <g opacity="0.03">
    <line x1="0" y1="40" x2="600" y2="40" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="600" y2="80" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="600" y2="120" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="600" y2="160" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="600" y2="200" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="600" y2="240" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="280" x2="600" y2="280" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="600" y2="320" stroke="#00d4ff" stroke-width="0.5"/>
  </g>
  <!-- INPUT: CSV Table (left side) -->
  <g transform="translate(40, 55)">
    <!-- Table frame -->
    <rect width="190" height="220" rx="6" fill="#0f0f1a" stroke="#00d4ff" stroke-width="1" opacity="0.8"/>
    <!-- CSV icon -->
    <rect x="10" y="-20" width="36" height="20" rx="4" fill="#00d4ff" opacity="0.2"/>
    <text x="28" y="-5" font-family="Consolas, monospace" font-size="9" fill="#00d4ff" text-anchor="middle" font-weight="bold">.CSV</text>
    <!-- Table header -->
    <rect x="1" y="1" width="188" height="28" rx="5" fill="url(#table-head)"/>
    <text x="15" y="19" font-family="Consolas, monospace" font-size="8" fill="#00d4ff" font-weight="bold">ID</text>
    <text x="55" y="19" font-family="Consolas, monospace" font-size="8" fill="#00d4ff" font-weight="bold">Name</text>
    <text x="110" y="19" font-family="Consolas, monospace" font-size="8" fill="#00d4ff" font-weight="bold">Value</text>
    <text x="155" y="19" font-family="Consolas, monospace" font-size="8" fill="#00d4ff" font-weight="bold">Date</text>
    <!-- Divider -->
    <line x1="5" y1="30" x2="185" y2="30" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
    <!-- Row 1 -->
    <text x="15" y="48" font-family="Consolas, monospace" font-size="7" fill="#ffffff" opacity="0.6">001</text>
    <text x="55" y="48" font-family="Consolas, monospace" font-size="7" fill="#ffffff" opacity="0.6">Alpha</text>
    <text x="110" y="48" font-family="Consolas, monospace" font-size="7" fill="#ffffff" opacity="0.6">$4,250</text>
    <text x="155" y="48" font-family="Consolas, monospace" font-size="7" fill="#ffffff" opacity="0.6">01/15</text>
    <!-- Row 2 -->
    <rect x="5" y="53" width="180" height="20" fill="#00d4ff" opacity="0.03"/>
    <text x="15" y="67" font-family="Consolas, monospace" font-size="7" fill="#ffffff" opacity="0.6">002</text>
    <text x="55" y="67" font-family="Consolas, monospace" font-size="7" fill="#ffffff" opacity="0.6">Beta</text>
    <text x="110" y="67" font-family="Consolas, monospace" font-size="7" fill="#ffffff" opacity="0.6">$3,180</text>
    <text x="155" y="67" font-family="Consolas, monospace" font-size="7" fill="#ffffff" opacity="0.6">02/20</text>
    <!-- Row 3 -->
    <text x="15" y="86" font-family="Consolas, monospace" font-size="7" fill="#ffffff" opacity="0.6">003</text>
    <text x="55" y="86" font-family="Consolas, monospace" font-size="7" fill="#ffffff" opacity="0.6">Gamma</text>
    <text x="110" y="86" font-family="Consolas, monospace" font-size="7" fill="#ffffff" opacity="0.6">$7,920</text>
    <text x="155" y="86" font-family="Consolas, monospace" font-size="7" fill="#ffffff" opacity="0.6">03/10</text>
    <!-- Row 4 -->
    <rect x="5" y="91" width="180" height="20" fill="#00d4ff" opacity="0.03"/>
    <text x="15" y="105" font-family="Consolas, monospace" font-size="7" fill="#ffffff" opacity="0.6">004</text>
    <text x="55" y="105" font-family="Consolas, monospace" font-size="7" fill="#ffffff" opacity="0.6">Delta</text>
    <text x="110" y="105" font-family="Consolas, monospace" font-size="7" fill="#ffffff" opacity="0.6">$2,640</text>
    <text x="155" y="105" font-family="Consolas, monospace" font-size="7" fill="#ffffff" opacity="0.6">04/05</text>
    <!-- Row 5 -->
    <text x="15" y="124" font-family="Consolas, monospace" font-size="7" fill="#ffffff" opacity="0.6">005</text>
    <text x="55" y="124" font-family="Consolas, monospace" font-size="7" fill="#ffffff" opacity="0.6">Epsilon</text>
    <text x="110" y="124" font-family="Consolas, monospace" font-size="7" fill="#ffffff" opacity="0.6">$5,100</text>
    <text x="155" y="124" font-family="Consolas, monospace" font-size="7" fill="#ffffff" opacity="0.6">05/18</text>
    <!-- More rows indicator -->
    <text x="95" y="150" font-family="Consolas, monospace" font-size="10" fill="#ffffff" opacity="0.2" text-anchor="middle">...</text>
    <!-- Row count -->
    <text x="95" y="175" font-family="Consolas, monospace" font-size="7" fill="#00d4ff" opacity="0.3" text-anchor="middle">10,000+ rows</text>
    <!-- Highlight effect on rows -->
    <rect x="5" y="36" width="180" height="20" fill="#00d4ff" opacity="0.02"/>
  </g>
  <!-- PROCESSING: Center gears and arrows -->
  <!-- Arrow from table to gears -->
  <g>
    <line x1="240" y1="165" x2="275" y2="165" stroke="url(#arrow-grad)" stroke-width="2"/>
    <polygon points="275,160 285,165 275,170" fill="#00d4ff" opacity="0.6"/>
    <line x1="240" y1="175" x2="275" y2="175" stroke="url(#arrow-grad)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="240" y1="155" x2="275" y2="155" stroke="url(#arrow-grad)" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>
  <!-- Gear 1 (large) -->
  <g transform="translate(315, 150)">
    <circle r="30" fill="#0f0f1a" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
    <circle r="20" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
    <circle r="8" fill="#00d4ff" opacity="0.15"/>
    <circle r="4" fill="#00d4ff" opacity="0.3"/>
    <!-- Gear teeth -->
    <rect x="-5" y="-34" width="10" height="10" rx="2" fill="#0f0f1a" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
    <rect x="-5" y="24" width="10" height="10" rx="2" fill="#0f0f1a" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
    <rect x="-34" y="-5" width="10" height="10" rx="2" fill="#0f0f1a" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
    <rect x="24" y="-5" width="10" height="10" rx="2" fill="#0f0f1a" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
    <rect x="17" y="-28" width="10" height="10" rx="2" fill="#0f0f1a" stroke="#00d4ff" stroke-width="1" opacity="0.6" transform="rotate(45 22 -23)"/>
    <rect x="-27" y="17" width="10" height="10" rx="2" fill="#0f0f1a" stroke="#00d4ff" stroke-width="1" opacity="0.6" transform="rotate(45 -22 22)"/>
    <rect x="-27" y="-27" width="10" height="10" rx="2" fill="#0f0f1a" stroke="#00d4ff" stroke-width="1" opacity="0.6" transform="rotate(45 -22 -22)"/>
    <rect x="17" y="17" width="10" height="10" rx="2" fill="#0f0f1a" stroke="#00d4ff" stroke-width="1" opacity="0.6" transform="rotate(45 22 22)"/>
  </g>
  <!-- Gear 2 (small) -->
  <g transform="translate(315, 215)">
    <circle r="20" fill="#0f0f1a" stroke="#00d4ff" stroke-width="1.2" opacity="0.7"/>
    <circle r="12" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
    <circle r="5" fill="#00d4ff" opacity="0.15"/>
    <circle r="2.5" fill="#00d4ff" opacity="0.3"/>
    <!-- Gear teeth -->
    <rect x="-4" y="-24" width="8" height="8" rx="1.5" fill="#0f0f1a" stroke="#00d4ff" stroke-width="0.8" opacity="0.5"/>
    <rect x="-4" y="16" width="8" height="8" rx="1.5" fill="#0f0f1a" stroke="#00d4ff" stroke-width="0.8" opacity="0.5"/>
    <rect x="-24" y="-4" width="8" height="8" rx="1.5" fill="#0f0f1a" stroke="#00d4ff" stroke-width="0.8" opacity="0.5"/>
    <rect x="16" y="-4" width="8" height="8" rx="1.5" fill="#0f0f1a" stroke="#00d4ff" stroke-width="0.8" opacity="0.5"/>
  </g>
  <!-- Processing label -->
  <text x="315" y="260" font-family="Consolas, monospace" font-size="8" fill="#00d4ff" opacity="0.5" text-anchor="middle">PROCESSING</text>
  <!-- Arrow from gears to output -->
  <g>
    <line x1="350" y1="165" x2="385" y2="165" stroke="url(#arrow-grad)" stroke-width="2"/>
    <polygon points="385,160 395,165 385,170" fill="#00d4ff" opacity="0.6"/>
    <line x1="350" y1="175" x2="385" y2="175" stroke="url(#arrow-grad)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="350" y1="155" x2="385" y2="155" stroke="url(#arrow-grad)" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>
  <!-- OUTPUT: Processed result (right side) -->
  <g transform="translate(390, 55)">
    <rect width="170" height="220" rx="6" fill="#0f0f1a" stroke="#00d4ff" stroke-width="1" opacity="0.8"/>
    <!-- Output icon -->
    <rect x="10" y="-20" width="50" height="20" rx="4" fill="#00d4ff" opacity="0.2"/>
    <text x="35" y="-5" font-family="Consolas, monospace" font-size="8" fill="#00d4ff" text-anchor="middle" font-weight="bold">OUTPUT</text>
    <!-- Chart bars -->
    <rect x="15" y="15" width="140" height="6" rx="2" fill="#00d4ff" opacity="0.15"/>
    <text x="15" y="13" font-family="Consolas, monospace" font-size="7" fill="#00d4ff" opacity="0.5">Summary</text>
    <rect x="15" y="35" width="20" height="60" rx="3" fill="#00d4ff" opacity="0.2"/>
    <rect x="15" y="55" width="20" height="40" rx="3" fill="#00d4ff" opacity="0.5"/>
    <rect x="45" y="35" width="20" height="60" rx="3" fill="#00d4ff" opacity="0.2"/>
    <rect x="45" y="40" width="20" height="55" rx="3" fill="#00d4ff" opacity="0.4"/>
    <rect x="75" y="35" width="20" height="60" rx="3" fill="#00d4ff" opacity="0.2"/>
    <rect x="75" y="50" width="20" height="45" rx="3" fill="#00d4ff" opacity="0.6"/>
    <rect x="105" y="35" width="20" height="60" rx="3" fill="#00d4ff" opacity="0.2"/>
    <rect x="105" y="45" width="20" height="50" rx="3" fill="#00d4ff" opacity="0.45"/>
    <rect x="135" y="35" width="20" height="60" rx="3" fill="#00d4ff" opacity="0.2"/>
    <rect x="135" y="38" width="20" height="57" rx="3" fill="#00d4ff" opacity="0.55"/>
    <!-- Stats -->
    <line x1="15" y1="108" x2="155" y2="108" stroke="#00d4ff" stroke-width="0.5" opacity="0.2"/>
    <text x="15" y="125" font-family="Consolas, monospace" font-size="7" fill="#ffffff" opacity="0.4">Total:</text>
    <text x="90" y="125" font-family="Consolas, monospace" font-size="9" fill="#00d4ff" font-weight="bold">$23,090</text>
    <text x="15" y="142" font-family="Consolas, monospace" font-size="7" fill="#ffffff" opacity="0.4">Avg:</text>
    <text x="90" y="142" font-family="Consolas, monospace" font-size="9" fill="#00d4ff" font-weight="bold">$4,618</text>
    <text x="15" y="159" font-family="Consolas, monospace" font-size="7" fill="#ffffff" opacity="0.4">Records:</text>
    <text x="90" y="159" font-family="Consolas, monospace" font-size="9" fill="#00d4ff" font-weight="bold">10,247</text>
    <!-- Check mark -->
    <circle cx="85" cy="190" r="12" fill="#00d4ff" opacity="0.1" stroke="#00d4ff" stroke-width="1"/>
    <polyline points="78,190 83,195 92,184" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <text x="85" y="212" font-family="Consolas, monospace" font-size="6" fill="#00d4ff" opacity="0.4" text-anchor="middle">COMPLETE</text>
  </g>
  <!-- Project name -->
  <text x="300" y="370" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.4" text-anchor="middle" letter-spacing="3">CSV Data Automation</text>
</svg>
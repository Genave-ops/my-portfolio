<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg-eq" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg-eq)" rx="12"/>
  <!-- Phone frame -->
  <rect x="200" y="30" width="200" height="340" rx="20" fill="#1a1a2e" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="250" y="38" width="100" height="6" rx="3" fill="#0f0f1a"/>
  <!-- Header -->
  <text x="240" y="75" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#22c55e">EcoQuest</text>
  <text x="340" y="75" font-family="Arial" font-size="12" fill="#22c55e">🌿</text>
  <!-- XP bar -->
  <rect x="218" y="82" width="164" height="18" rx="9" fill="#0f0f1a" opacity="0.8"/>

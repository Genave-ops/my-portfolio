  <rect x="218" y="108" width="164" height="120" rx="8" fill="#0a0a0a" stroke="#22c55e" stroke-width="0.5" opacity="0.6"/>
  <rect x="228" y="118" width="20" height="20" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.4"/>
  <line x1="228" y1="118" x2="238" y2="118" stroke="#22c55e" stroke-width="2"/>
  <line x1="228" y1="118" x2="228" y2="128" stroke="#22c55e" stroke-width="2"/>
  <rect x="352" y="118" width="20" height="20" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.4"/>
  <line x1="362" y1="118" x2="372" y2="118" stroke="#22c55e" stroke-width="2"/>
  <line x1="372" y1="118" x2="372" y2="128" stroke="#22c55e" stroke-width="2"/>
  <rect x="228" y="198" width="20" height="20" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.4"/>
  <line x1="228" y1="218" x2="238" y2="218" stroke="#22c55e" stroke-width="2"/>
  <line x1="228" y1="208" x2="228" y2="218" stroke="#22c55e" stroke-width="2"/>
  <rect x="352" y="198" width="20" height="20" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.4"/>
  <line x1="362" y1="218" x2="372" y2="218" stroke="#22c55e" stroke-width="2"/>
  <line x1="372" y1="208" x2="372" y2="218" stroke="#22c55e" stroke-width="2"/>
  <!-- QR icon in center -->
  <rect x="280" y="148" width="40" height="40" rx="4" fill="#22c55e" opacity="0.1" stroke="#22c55e" stroke-width="1"/>
  <rect x="288" y="156" width="8" height="8" fill="#22c55e" opacity="0.5"/>
  <rect x="304" y="156" width="8" height="8" fill="#22c55e" opacity="0.5"/>
  <rect x="288" y="172" width="8" height="8" fill="#22c55e" opacity="0.5"/>
  <rect x="296" y="164" width="8" height="8" fill="#22c55e" opacity="0.3"/>
  <text x="300" y="200" font-family="Arial" font-size="7" fill="#22c55e" text-anchor="middle" opacity="0.7">Scan eco-challenge</text>
  <!-- Challenge cards -->
  <rect x="218" y="236" width="164" height="40" rx="6" fill="#0f0f1a" stroke="#22c55e" stroke-width="0.5" opacity="0.8"/>
  <circle cx="236" cy="256" r="10" fill="#22c55e" opacity="0.15"/>
  <text x="236" y="260" font-family="Arial" font-size="10" text-anchor="middle" fill="#22c55e">♻</text>
  <text x="254" y="252" font-family="Arial" font-size="8" fill="#ffffff" opacity="0.9">Recycle 5 items</text>
  <text x="254" y="264" font-family="Arial" font-size="7" fill="#22c55e" opacity="0.7">+50 XP - 3/5 complete</text>
  <rect x="218" y="282" width="164" height="40" rx="6" fill="#0f0f1a" stroke="#22c55e" stroke-width="0.5" opacity="0.8"/>
  <circle cx="236" cy="302" r="10" fill="#22c55e" opacity="0.15"/>
  <text x="236" y="306" font-family="Arial" font-size="10" text-anchor="middle" fill="#22c55e">🌱</text>
  <text x="254" y="298" font-family="Arial" font-size="8" fill="#ffffff" opacity="0.9">Plant a tree</text>
  <text x="254" y="310" font-family="Arial" font-size="7" fill="#f59e0b" opacity="0.7">+100 XP - Not started</text>
  <!-- Bottom nav -->
  <rect x="215" y="330" width="170" height="28" fill="#0f0f1a" opacity="0.8"/>
  <text x="300" y="390" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.4" text-anchor="middle" letter-spacing="3">EcoQuest</text>

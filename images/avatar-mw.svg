<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg-mw" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="silhouette-mw" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0.08"/>
    </linearGradient>
    <clipPath id="circle-clip-mw">
      <circle cx="60" cy="60" r="54"/>
    </clipPath>
  </defs>
  <!-- Outer ring -->
  <circle cx="60" cy="60" r="58" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <!-- Main circle border -->
  <circle cx="60" cy="60" r="55" fill="url(#bg-mw)" stroke="#00d4ff" stroke-width="2.5"/>
  <!-- Inner subtle glow -->
  <circle cx="60" cy="50" r="30" fill="#00d4ff" opacity="0.03"/>
  <!-- Male silhouette (clipped to circle) -->
  <g clip-path="url(#circle-clip-mw)">
    <!-- Head -->
    <circle cx="60" cy="42" r="16" fill="url(#silhouette-mw)" stroke="#00d4ff" stroke-width="0.8" opacity="0.6"/>
    <!-- Short hair line -->
    <path d="M 44,38 Q 48,26 60,24 Q 72,26 76,38" fill="url(#silhouette-mw)" stroke="#00d4ff" stroke-width="0.4" opacity="0.3"/>
    <!-- Shoulders / Body -->
    <ellipse cx="60" cy="100" rx="34" ry="28" fill="url(#silhouette-mw)" stroke="#00d4ff" stroke-width="0.8" opacity="0.5"/>
    <!-- Neck -->
    <rect x="52" y="56" width="16" height="16" rx="5" fill="url(#silhouette-mw)" opacity="0.4"/>
    <!-- Collar / shirt detail -->
    <line x1="48" y1="76" x2="60" y2="82" stroke="#00d4ff" stroke-width="0.4" opacity="0.2"/>
    <line x1="72" y1="76" x2="60" y2="82" stroke="#00d4ff" stroke-width="0.4" opacity="0.2"/>
  </g>
  <!-- Initials -->
  <text x="60" y="68" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0.85" letter-spacing="1">MW</text>
  <!-- Decorative dots on border -->
  <circle cx="60" cy="3" r="2" fill="#00d4ff" opacity="0.5"/>
  <circle cx="60" cy="117" r="2" fill="#00d4ff" opacity="0.5"/>
</svg>
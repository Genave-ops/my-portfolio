<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg-3d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="wire-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="face-top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="face-front" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.02"/>
    </linearGradient>
    <linearGradient id="face-right" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.03"/>
    </linearGradient>
    <linearGradient id="palette-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="palette-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0099cc"/>
    </linearGradient>
    <filter id="glow-3d">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg-3d)" rx="12"/>
  <!-- Background grid (perspective feel) -->
  <g opacity="0.04">
    <line x1="300" y1="0" x2="0" y2="400" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="600" y2="400" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="100" y2="400" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="500" y2="400" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="200" y2="400" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="400" y2="400" stroke="#7c3aed" stroke-width="0.5"/>
  </g>
  <!-- 3D Wireframe Cube (center-left) -->
  <g filter="url(#glow-3d)">
    <!-- Back face -->
    <polygon points="230,80 340,80 340,200 230,200" fill="none" stroke="#7c3aed" stroke-width="0.8" opacity="0.3"/>
    <!-- Front face -->
    <polygon points="190,120 300,120 300,240 190,240" fill="url(#face-front)" stroke="#7c3aed" stroke-width="1.5"/>
    <!-- Top face -->
    <polygon points="190,120 230,80 340,80 300,120" fill="url(#face-top)" stroke="#7c3aed" stroke-width="1.5"/>
    <!-- Right face -->
    <polygon points="300,120 340,80 340,200 300,240" fill="url(#face-right)" stroke="#7c3aed" stroke-width="1.5"/>
    <!-- Vertices glow dots -->
    <circle cx="190" cy="120" r="3" fill="#7c3aed" opacity="0.6"/>
    <circle cx="300" cy="120" r="3" fill="#7c3aed" opacity="0.6"/>
    <circle cx="190" cy="240" r="3" fill="#7c3aed" opacity="0.6"/>
    <circle cx="300" cy="240" r="3" fill="#7c3aed" opacity="0.6"/>
    <circle cx="230" cy="80" r="3" fill="#a855f7" opacity="0.5"/>
    <circle cx="340" cy="80" r="3" fill="#a855f7" opacity="0.5"/>
    <circle cx="340" cy="200" r="3" fill="#a855f7" opacity="0.5"/>
    <circle cx="230" cy="200" r="2" fill="#a855f7" opacity="0.3"/>
  </g>
  <!-- Inner wireframe detail on front face -->
  <line x1="245" y1="120" x2="245" y2="240" stroke="#7c3aed" stroke-width="0.4" opacity="0.2"/>
  <line x1="190" y1="180" x2="300" y2="180" stroke="#7c3aed" stroke-width="0.4" opacity="0.2"/>
  <!-- Diagonal wireframe on front -->
  <line x1="190" y1="120" x2="300" y2="240" stroke="#7c3aed" stroke-width="0.3" opacity="0.15"/>
  <line x1="300" y1="120" x2="190" y2="240" stroke="#7c3aed" stroke-width="0.3" opacity="0.15"/>
  <!-- Floating wireframe sphere (upper right) -->
  <g transform="translate(440, 100)" opacity="0.5">
    <circle r="40" fill="none" stroke="#7c3aed" stroke-width="1"/>
    <ellipse rx="40" ry="14" fill="none" stroke="#7c3aed" stroke-width="0.6" opacity="0.5"/>
    <ellipse rx="40" ry="14" fill="none" stroke="#7c3aed" stroke-width="0.6" opacity="0.5" transform="rotate(60)"/>
    <ellipse rx="40" ry="14" fill="none" stroke="#7c3aed" stroke-width="0.6" opacity="0.5" transform="rotate(120)"/>
    <ellipse rx="14" ry="40" fill="none" stroke="#7c3aed" stroke-width="0.6" opacity="0.4"/>
    <circle r="3" fill="#7c3aed" opacity="0.4"/>
  </g>
  <!-- Floating wireframe pyramid (lower right) -->
  <g transform="translate(460, 250)" opacity="0.4">
    <polygon points="0,-40 -35,25 35,25" fill="none" stroke="#a855f7" stroke-width="1"/>
    <line x1="0" y1="-40" x2="0" y2="25" stroke="#a855f7" stroke-width="0.4" opacity="0.3"/>
    <!-- 3D depth lines -->
    <line x1="0" y1="-40" x2="20" y2="5" stroke="#a855f7" stroke-width="0.6" opacity="0.4" stroke-dasharray="3,3"/>
    <line x1="-35" y1="25" x2="20" y2="5" stroke="#a855f7" stroke-width="0.6" opacity="0.3" stroke-dasharray="3,3"/>
    <line x1="35" y1="25" x2="20" y2="5" stroke="#a855f7" stroke-width="0.6" opacity="0.3" stroke-dasharray="3,3"/>
    <circle cx="0" cy="-40" r="2.5" fill="#a855f7" opacity="0.5"/>
    <circle cx="-35" cy="25" r="2.5" fill="#a855f7" opacity="0.5"/>
    <circle cx="35" cy="25" r="2.5" fill="#a855f7" opacity="0.5"/>
    <circle cx="20" cy="5" r="2" fill="#a855f7" opacity="0.4"/>
  </g>
  <!-- Color palette strip (bottom left area) -->
  <g transform="translate(80, 280)">
    <text x="0" y="-8" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" opacity="0.3">COLOR PALETTE</text>
    <rect x="0" y="0" width="28" height="28" rx="4" fill="#7c3aed" stroke="#ffffff" stroke-width="0.5" opacity="0.8"/>
    <rect x="34" y="0" width="28" height="28" rx="4" fill="#a855f7" stroke="#ffffff" stroke-width="0.5" opacity="0.8"/>
    <rect x="68" y="0" width="28" height="28" rx="4" fill="#00d4ff" stroke="#ffffff" stroke-width="0.5" opacity="0.8"/>
    <rect x="102" y="0" width="28" height="28" rx="4" fill="#ffffff" stroke="#ffffff" stroke-width="0.5" opacity="0.8"/>
    <rect x="136" y="0" width="28" height="28" rx="4" fill="#1a1a2e" stroke="#7c3aed" stroke-width="0.5" opacity="0.8"/>
    <!-- Active indicator -->
    <circle cx="14" cy="36" r="2" fill="#7c3aed" opacity="0.8"/>
  </g>
  <!-- Pen / Brush tool icon -->
  <g transform="translate(100, 180) rotate(-45)" opacity="0.3">
    <rect x="-3" y="-30" width="6" height="40" rx="2" fill="#7c3aed"/>
    <polygon points="-3,10 3,10 0,18" fill="#a855f7"/>
    <rect x="-3" y="-30" width="6" height="8" rx="1" fill="#a855f7" opacity="0.6"/>
  </g>
  <!-- Layers indicator (right side) -->
  <g transform="translate(380, 310)" opacity="0.35">
    <rect x="0" y="0" width="60" height="35" rx="4" fill="#1a1a2e" stroke="#7c3aed" stroke-width="0.8"/>
    <rect x="8" y="-6" width="60" height="35" rx="4" fill="#1a1a2e" stroke="#7c3aed" stroke-width="0.8"/>
    <rect x="16" y="-12" width="60" height="35" rx="4" fill="#1a1a2e" stroke="#a855f7" stroke-width="1"/>
    <text x="46" y="6" font-family="Arial, sans-serif" font-size="7" fill="#a855f7" text-anchor="middle">Layers</text>
  </g>
  <!-- Floating particles -->
  <circle cx="150" cy="60" r="1.5" fill="#7c3aed" opacity="0.4"/>
  <circle cx="520" cy="180" r="2" fill="#a855f7" opacity="0.3"/>
  <circle cx="350" cy="300" r="1.5" fill="#7c3aed" opacity="0.25"/>
  <circle cx="550" cy="320" r="1.5" fill="#a855f7" opacity="0.2"/>
  <circle cx="70" cy="130" r="1" fill="#7c3aed" opacity="0.3"/>
  <!-- Axis lines near cube -->
  <g opacity="0.25">
    <line x1="175" y1="255" x2="175" y2="230" stroke="#ff4444" stroke-width="1.2"/>
    <text x="172" y="225" font-family="Arial, sans-serif" font-size="7" fill="#ff4444" opacity="0.7">Y</text>
    <line x1="175" y1="255" x2="200" y2="255" stroke="#44ff44" stroke-width="1.2"/>
    <text x="203" y="258" font-family="Arial, sans-serif" font-size="7" fill="#44ff44" opacity="0.7">X</text>
    <line x1="175" y1="255" x2="160" y2="268" stroke="#4488ff" stroke-width="1.2"/>
    <text x="152" y="275" font-family="Arial, sans-serif" font-size="7" fill="#4488ff" opacity="0.7">Z</text>
  </g>
  <!-- Project name -->
  <text x="300" y="380" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.4" text-anchor="middle" letter-spacing="3">3D &amp; Creative Media</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg-bk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg-bk)" rx="12"/>
  <!-- Phone frame -->
  <rect x="200" y="30" width="200" height="340" rx="20" fill="#1a1a2e" stroke="#6366f1" stroke-width="1.5"/>
  <rect x="250" y="38" width="100" height="6" rx="3" fill="#0f0f1a"/>
  <!-- Header -->
  <text x="230" y="75" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Banking Sim</text>
  <circle cx="370" cy="70" r="10" fill="#6366f1" opacity="0.15"/>
  <text x="370" y="74" font-family="Arial" font-size="10" text-anchor="middle" fill="#6366f1">🏦</text>
  <!-- Balance card -->
  <rect x="218" y="85" width="164" height="70" rx="10" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-width="0.5"/>
  <text x="230" y="102" font-family="Arial" font-size="7" fill="#ffffff" opacity="0.5">Total Balance</text>
  <text x="230" y="124" font-family="Arial" font-size="22" font-weight="bold" fill="#ffffff">$24,580</text>
  <text x="230" y="142" font-family="Arial" font-size="7" fill="#10b981">+12.5% this month</text>
  <!-- Quick actions -->
  <g font-family="Arial" font-size="6" fill="#ffffff" opacity="0.6" text-anchor="middle">
    <circle cx="240" cy="176" r="14" fill="#6366f1" opacity="0.1" stroke="#6366f1" stroke-width="0.5"/>
    <text x="240" y="170" font-size="10" fill="#6366f1">↑</text>
    <text x="240" y="196">Send</text>
    <circle cx="280" cy="176" r="14" fill="#6366f1" opacity="0.1" stroke="#6366f1" stroke-width="0.5"/>
    <text x="280" y="170" font-size="10" fill="#6366f1">↓</text>
    <text x="280" y="196">Receive</text>
    <circle cx="320" cy="176" r="14" fill="#6366f1" opacity="0.1" stroke="#6366f1" stroke-width="0.5"/>
    <text x="320" y="170" font-size="10" fill="#6366f1">💳</text>
    <text x="320" y="196">Cards</text>
    <circle cx="360" cy="176" r="14" fill="#6366f1" opacity="0.1" stroke="#6366f1" stroke-width="0.5"/>
    <text x="360" y="170" font-size="10" fill="#6366f1">⋯</text>
    <text x="360" y="196">More</text>
  </g>
  <!-- Transactions -->
  <text x="225" y="218" font-family="Arial" font-size="9" font-weight="bold" fill="#ffffff" opacity="0.8">Recent Transactions</text>
  <rect x="218" y="225" width="164" height="35" rx="6" fill="#0f0f1a" opacity="0.6"/>
  <circle cx="234" cy="242" r="8" fill="#10b981" opacity="0.15"/>
  <text x="234" y="246" font-family="Arial" font-size="8" text-anchor="middle" fill="#10b981">↓</text>
  <text x="250" y="238" font-family="Arial" font-size="8" fill="#ffffff" opacity="0.8">Salary Deposit</text>
  <text x="250" y="250" font-family="Arial" font-size="7" fill="#ffffff" opacity="0.4">Mar 15, 2026</text>
  <text x="370" y="244" font-family="Arial" font-size="9" font-weight="bold" fill="#10b981" text-anchor="end">+$3,200</text>
  <rect x="218" y="264" width="164" height="35" rx="6" fill="#0f0f1a" opacity="0.6"/>
  <circle cx="234" cy="281" r="8" fill="#ef4444" opacity="0.15"/>
  <text x="234" y="285" font-family="Arial" font-size="8" text-anchor="middle" fill="#ef4444">↑</text>
  <text x="250" y="277" font-family="Arial" font-size="8" fill="#ffffff" opacity="0.8">Grocery Store</text>
  <text x="250" y="289" font-family="Arial" font-size="7" fill="#ffffff" opacity="0.4">Mar 14, 2026</text>
  <text x="370" y="283" font-family="Arial" font-size="9" font-weight="bold" fill="#ef4444" text-anchor="end">-$85.40</text>
  <rect x="218" y="303" width="164" height="35" rx="6" fill="#0f0f1a" opacity="0.6"/>
  <circle cx="234" cy="320" r="8" fill="#ef4444" opacity="0.15"/>
  <text x="234" y="324" font-family="Arial" font-size="8" text-anchor="middle" fill="#ef4444">↑</text>
  <text x="250" y="316" font-family="Arial" font-size="8" fill="#ffffff" opacity="0.8">Netflix</text>
  <text x="250" y="328" font-family="Arial" font-size="7" fill="#ffffff" opacity="0.4">Mar 13, 2026</text>
  <text x="370" y="322" font-family="Arial" font-size="9" font-weight="bold" fill="#ef4444" text-anchor="end">-$15.99</text>
  <text x="300" y="390" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.4" text-anchor="middle" letter-spacing="3">Banking Simulation</text>
</svg>
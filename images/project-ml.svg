<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg-ml" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="node-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="node-dim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="glow-ml">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg-ml)" rx="12"/>
  <!-- Subtle radial glow -->
  <circle cx="300" cy="180" r="180" fill="#00d4ff" opacity="0.02"/>
  <circle cx="300" cy="180" r="100" fill="#00d4ff" opacity="0.02"/>
  <!-- Neural network connections (Layer 1 to Layer 2) -->
  <g opacity="0.15" stroke="#00d4ff" stroke-width="1">
    <!-- Input to Hidden 1 -->
    <line x1="100" y1="80" x2="230" y2="60"/>
    <line x1="100" y1="80" x2="230" y2="130"/>
    <line x1="100" y1="80" x2="230" y2="200"/>
    <line x1="100" y1="80" x2="230" y2="270"/>
    <line x1="100" y1="160" x2="230" y2="60"/>
    <line x1="100" y1="160" x2="230" y2="130"/>
    <line x1="100" y1="160" x2="230" y2="200"/>
    <line x1="100" y1="160" x2="230" y2="270"/>
    <line x1="100" y1="240" x2="230" y2="60"/>
    <line x1="100" y1="240" x2="230" y2="130"/>
    <line x1="100" y1="240" x2="230" y2="200"/>
    <line x1="100" y1="240" x2="230" y2="270"/>
    <line x1="100" y1="320" x2="230" y2="60"/>
    <line x1="100" y1="320" x2="230" y2="130"/>
    <line x1="100" y1="320" x2="230" y2="200"/>
    <line x1="100" y1="320" x2="230" y2="270"/>
  </g>
  <!-- Hidden 1 to Hidden 2 connections -->
  <g opacity="0.2" stroke="#00d4ff" stroke-width="1">
    <line x1="230" y1="60" x2="370" y2="90"/>
    <line x1="230" y1="60" x2="370" y2="170"/>
    <line x1="230" y1="60" x2="370" y2="250"/>
    <line x1="230" y1="130" x2="370" y2="90"/>
    <line x1="230" y1="130" x2="370" y2="170"/>
    <line x1="230" y1="130" x2="370" y2="250"/>
    <line x1="230" y1="200" x2="370" y2="90"/>
    <line x1="230" y1="200" x2="370" y2="170"/>
    <line x1="230" y1="200" x2="370" y2="250"/>
    <line x1="230" y1="270" x2="370" y2="90"/>
    <line x1="230" y1="270" x2="370" y2="170"/>
    <line x1="230" y1="270" x2="370" y2="250"/>
  </g>
  <!-- Hidden 2 to Output connections -->
  <g opacity="0.25" stroke="#00d4ff" stroke-width="1.2">
    <line x1="370" y1="90" x2="500" y2="140"/>
    <line x1="370" y1="90" x2="500" y2="220"/>
    <line x1="370" y1="170" x2="500" y2="140"/>
    <line x1="370" y1="170" x2="500" y2="220"/>
    <line x1="370" y1="250" x2="500" y2="140"/>
    <line x1="370" y1="250" x2="500" y2="220"/>
  </g>
  <!-- Data flow arrows (animated feel) -->
  <g opacity="0.3">
    <circle cx="160" cy="110" r="2" fill="#00d4ff"/>
    <circle cx="180" cy="145" r="1.5" fill="#00d4ff"/>
    <circle cx="300" cy="120" r="2" fill="#00d4ff"/>
    <circle cx="320" cy="200" r="1.5" fill="#00d4ff"/>
    <circle cx="430" cy="170" r="2" fill="#00d4ff"/>
    <circle cx="450" cy="195" r="1.5" fill="#00d4ff"/>
  </g>
  <!-- Input layer nodes -->
  <g filter="url(#glow-ml)">
    <circle cx="100" cy="80" r="14" fill="url(#node-dim)" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="100" cy="160" r="14" fill="url(#node-dim)" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="100" cy="240" r="14" fill="url(#node-dim)" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="100" cy="320" r="14" fill="url(#node-dim)" stroke="#00d4ff" stroke-width="1"/>
  </g>
  <!-- Hidden layer 1 nodes -->
  <g filter="url(#glow-ml)">
    <circle cx="230" cy="60" r="16" fill="url(#node-cyan)" stroke="#00d4ff" stroke-width="1.2"/>
    <circle cx="230" cy="130" r="16" fill="url(#node-cyan)" stroke="#00d4ff" stroke-width="1.2"/>
    <circle cx="230" cy="200" r="16" fill="url(#node-cyan)" stroke="#00d4ff" stroke-width="1.2"/>
    <circle cx="230" cy="270" r="16" fill="url(#node-cyan)" stroke="#00d4ff" stroke-width="1.2"/>
  </g>
  <!-- Hidden layer 2 nodes -->
  <g filter="url(#glow-ml)">
    <circle cx="370" cy="90" r="18" fill="url(#node-cyan)" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="370" cy="170" r="18" fill="url(#node-cyan)" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="370" cy="250" r="18" fill="url(#node-cyan)" stroke="#00d4ff" stroke-width="1.5"/>
  </g>
  <!-- Output layer nodes -->
  <g filter="url(#glow-ml)">
    <circle cx="500" cy="140" r="20" fill="url(#node-cyan)" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="500" cy="220" r="20" fill="url(#node-cyan)" stroke="#00d4ff" stroke-width="2"/>
  </g>
  <!-- Node inner symbols -->
  <text x="100" y="84" font-family="Consolas, monospace" font-size="8" fill="#ffffff" opacity="0.6" text-anchor="middle">x1</text>
  <text x="100" y="164" font-family="Consolas, monospace" font-size="8" fill="#ffffff" opacity="0.6" text-anchor="middle">x2</text>
  <text x="100" y="244" font-family="Consolas, monospace" font-size="8" fill="#ffffff" opacity="0.6" text-anchor="middle">x3</text>
  <text x="100" y="324" font-family="Consolas, monospace" font-size="8" fill="#ffffff" opacity="0.6" text-anchor="middle">x4</text>
  <!-- Sigma symbols in hidden nodes -->
  <text x="230" y="65" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" opacity="0.7" text-anchor="middle">&#963;</text>
  <text x="230" y="135" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" opacity="0.7" text-anchor="middle">&#963;</text>
  <text x="230" y="205" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" opacity="0.7" text-anchor="middle">&#963;</text>
  <text x="230" y="275" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" opacity="0.7" text-anchor="middle">&#963;</text>
  <text x="370" y="95" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.8" text-anchor="middle">f</text>
  <text x="370" y="175" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.8" text-anchor="middle">f</text>
  <text x="370" y="255" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.8" text-anchor="middle">f</text>
  <text x="500" y="145" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.9" text-anchor="middle">y1</text>
  <text x="500" y="225" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.9" text-anchor="middle">y2</text>
  <!-- Layer labels -->
  <text x="100" y="360" font-family="Arial, sans-serif" font-size="9" fill="#00d4ff" opacity="0.4" text-anchor="middle">Input</text>
  <text x="230" y="310" font-family="Arial, sans-serif" font-size="9" fill="#00d4ff" opacity="0.4" text-anchor="middle">Hidden 1</text>
  <text x="370" y="295" font-family="Arial, sans-serif" font-size="9" fill="#00d4ff" opacity="0.4" text-anchor="middle">Hidden 2</text>
  <text x="500" y="265" font-family="Arial, sans-serif" font-size="9" fill="#00d4ff" opacity="0.4" text-anchor="middle">Output</text>
  <!-- Project name -->
  <text x="300" y="385" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.4" text-anchor="middle" letter-spacing="3">ML Data Processing</text>
</svg>
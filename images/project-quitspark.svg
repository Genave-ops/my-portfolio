<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg-qs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg-qs)" rx="12"/>
  <!-- Phone frame -->
  <rect x="200" y="30" width="200" height="340" rx="20" fill="#1a1a2e" stroke="#f97316" stroke-width="1.5"/>
  <rect x="250" y="38" width="100" height="6" rx="3" fill="#0f0f1a"/>
  <!-- Header -->
  <text x="255" y="75" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">QuitSpark</text>
  <text x="355" y="75" font-family="Arial" font-size="12" fill="#f97316">🔥</text>
  <!-- Big counter circle -->
  <circle cx="300" cy="155" r="55" fill="none" stroke="#1a1a2e" stroke-width="8"/>
  <circle cx="300" cy="155" r="55" fill="none" stroke="#f97316" stroke-width="8" stroke-dasharray="280" stroke-dashoffset="70" stroke-linecap="round" transform="rotate(-90 300 155)"/>
  <text x="300" y="148" font-family="Arial" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">47</text>
  <text x="300" y="165" font-family="Arial" font-size="8" fill="#f97316" text-anchor="middle" opacity="0.8">DAYS SMOKE-FREE</text>
  <!-- Stats row -->
  <rect x="218" y="220" width="72" height="45" rx="6" fill="#0f0f1a" stroke="#f97316" stroke-width="0.5" opacity="0.6"/>
  <text x="254" y="240" font-family="Arial" font-size="12" font-weight="bold" fill="#10b981" text-anchor="middle">$235</text>
  <text x="254" y="254" font-family="Arial" font-size="7" fill="#ffffff" opacity="0.5" text-anchor="middle">Saved</text>
  <rect x="298" y="220" width="82" height="45" rx="6" fill="#0f0f1a" stroke="#f97316" stroke-width="0.5" opacity="0.6"/>
  <text x="339" y="240" font-family="Arial" font-size="12" font-weight="bold" fill="#f97316" text-anchor="middle">940</text>
  <text x="339" y="254" font-family="Arial" font-size="7" fill="#ffffff" opacity="0.5" text-anchor="middle">Not Smoked</text>
  <!-- Mini chart -->
  <rect x="218" y="275" width="164" height="55" rx="6" fill="#0f0f1a" opacity="0.6"/>
  <polyline points="230,310 250,305 270,315 290,295 310,300 330,290 350,285 370,280" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>
  <text x="228" y="290" font-family="Arial" font-size="7" fill="#ffffff" opacity="0.5">Weekly Progress</text>
  <!-- Bottom nav -->
  <rect x="215" y="338" width="170" height="20" fill="#0f0f1a" opacity="0.8"/>
  <ellipse cx="300" cy="200" rx="150" ry="80" fill="#f97316" opacity="0.02"/>
  <text x="300" y="390" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.4" text-anchor="middle" letter-spacing="3">QuitSpark</text>
</svg>
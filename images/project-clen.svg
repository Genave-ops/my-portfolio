  <rect x="174" y="166" width="232" height="130" rx="6" fill="#0a0a0a" stroke="#00d4ff" stroke-width="0.5" opacity="0.7"/>
  <!-- Code lines -->
  <text x="184" y="184" font-family="Consolas, monospace" font-size="8" fill="#7c3aed">import</text>
  <text x="218" y="184" font-family="Consolas, monospace" font-size="8" fill="#ffffff" opacity="0.7"> React </text>
  <text x="252" y="184" font-family="Consolas, monospace" font-size="8" fill="#7c3aed">from</text>
  <text x="275" y="184" font-family="Consolas, monospace" font-size="8" fill="#00d4ff"> 'react'</text>
  <rect x="184" y="192" width="140" height="5" rx="1" fill="#ffffff" opacity="0.08"/>
  <text x="184" y="206" font-family="Consolas, monospace" font-size="8" fill="#7c3aed">const</text>
  <text x="212" y="206" font-family="Consolas, monospace" font-size="8" fill="#00d4ff"> Dashboard</text>
  <text x="275" y="206" font-family="Consolas, monospace" font-size="8" fill="#ffffff" opacity="0.5"> = () =&gt; {</text>

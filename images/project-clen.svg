<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg-clen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="cyan-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="card-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg-clen)" rx="12"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="50" x2="600" y2="50" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="600" y2="100" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="600" y2="150" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="600" y2="200" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="600" y2="250" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="600" y2="300" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="400" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="400" stroke="#00d4ff" stroke-width="0.5"/>
  </g>

  <rect x="450" y="235" width="12" height="45" rx="2" fill="#00d4ff" opacity="0.6"/>
  <rect x="468" y="220" width="12" height="60" rx="2" fill="#00d4ff" opacity="0.8"/>
  <rect x="486" y="240" width="12" height="40" rx="2" fill="#00d4ff" opacity="0.5"/>
  <rect x="504" y="225" width="12" height="55" rx="2" fill="#00d4ff" opacity="0.7"/>
  <rect x="430" y="178" width="50" height="6" rx="2" fill="#ffffff" opacity="0.3"/>
  <!-- Glow effect -->
  <ellipse cx="300" cy="200" rx="200" ry="100" fill="#00d4ff" opacity="0.02"/>
  <!-- Project name -->
  <text x="300" y="370" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.4" text-anchor="middle" letter-spacing="3">CLEn Portal</text>

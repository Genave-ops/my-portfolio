  <rect x="186" y="96" width="40" height="6" rx="2" fill="#00d4ff" opacity="0.5"/>
  <text x="186" y="124" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#00d4ff">247</text>
  <rect x="186" y="134" width="60" height="4" rx="1" fill="#ffffff" opacity="0.2"/>
  <rect x="296" y="84" width="110" height="70" rx="6" fill="url(#card-fill)" stroke="#00d4ff" stroke-width="0.5" opacity="0.8"/>
  <rect x="308" y="96" width="36" height="6" rx="2" fill="#00d4ff" opacity="0.5"/>
  <text x="308" y="124" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" opacity="0.9">89%</text>

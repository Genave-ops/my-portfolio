<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg-game" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="ctrl-body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1a4e"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="purple-btn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="glow-game">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg-game)" rx="12"/>
  <!-- Particle effects - scattered geometric shapes -->
  <!-- Stars -->
  <polygon points="80,60 83,70 93,70 85,76 88,86 80,80 72,86 75,76 67,70 77,70" fill="#7c3aed" opacity="0.3"/>
  <polygon points="520,80 522,86 528,86 523,90 525,96 520,92 515,96 517,90 512,86 518,86" fill="#7c3aed" opacity="0.25"/>
  <polygon points="150,320 152,326 158,326 153,330 155,336 150,332 145,336 147,330 142,326 148,326" fill="#a855f7" opacity="0.2"/>
  <polygon points="460,310 462,316 468,316 463,320 465,326 460,322 455,326 457,320 452,316 458,316" fill="#7c3aed" opacity="0.25"/>
  <!-- Floating blocks -->
  <rect x="500" y="140" width="18" height="18" rx="3" fill="#7c3aed" opacity="0.15" transform="rotate(15 509 149)"/>
  <rect x="70" y="140" width="14" height="14" rx="2" fill="#a855f7" opacity="0.12" transform="rotate(-20 77 147)"/>
  <rect x="530" y="260" width="12" height="12" rx="2" fill="#7c3aed" opacity="0.1" transform="rotate(30 536 266)"/>
  <rect x="50" y="250" width="16" height="16" rx="3" fill="#a855f7" opacity="0.1" transform="rotate(-10 58 258)"/>
  <!-- Small particles / dots -->
  <circle cx="120" cy="100" r="2" fill="#7c3aed" opacity="0.4"/>
  <circle cx="480" cy="120" r="1.5" fill="#a855f7" opacity="0.3"/>
  <circle cx="200" cy="50" r="1.5" fill="#7c3aed" opacity="0.3"/>
  <circle cx="400" cy="40" r="2" fill="#a855f7" opacity="0.25"/>
  <circle cx="550" cy="200" r="1.5" fill="#7c3aed" opacity="0.3"/>
  <circle cx="40" cy="200" r="2" fill="#a855f7" opacity="0.2"/>
  <circle cx="340" cy="330" r="1.5" fill="#7c3aed" opacity="0.25"/>
  <circle cx="160" cy="280" r="2" fill="#a855f7" opacity="0.2"/>
  <!-- Game controller body -->
  <g transform="translate(300, 190)">
    <!-- Main body -->
    <ellipse cx="0" cy="0" rx="120" ry="70" fill="url(#ctrl-body)" stroke="#7c3aed" stroke-width="2"/>
    <!-- Left grip -->
    <ellipse cx="-95" cy="50" rx="40" ry="55" fill="url(#ctrl-body)" stroke="#7c3aed" stroke-width="2"/>
    <!-- Right grip -->
    <ellipse cx="95" cy="50" rx="40" ry="55" fill="url(#ctrl-body)" stroke="#7c3aed" stroke-width="2"/>
    <!-- Cover body overlap -->
    <ellipse cx="0" cy="10" rx="115" ry="60" fill="url(#ctrl-body)"/>
    <!-- D-Pad -->
    <rect x="-65" y="-15" width="30" height="8" rx="2" fill="#1a1a2e" stroke="#7c3aed" stroke-width="1" opacity="0.7"/>
    <rect x="-54" y="-26" width="8" height="30" rx="2" fill="#1a1a2e" stroke="#7c3aed" stroke-width="1" opacity="0.7"/>
    <!-- Action buttons -->
    <circle cx="55" cy="-18" r="8" fill="#1a1a2e" stroke="#a855f7" stroke-width="1.2"/>
    <circle cx="73" cy="-5" r="8" fill="#1a1a2e" stroke="#7c3aed" stroke-width="1.2"/>
    <circle cx="37" cy="-5" r="8" fill="#1a1a2e" stroke="#7c3aed" stroke-width="1.2"/>
    <circle cx="55" cy="8" r="8" fill="#1a1a2e" stroke="#a855f7" stroke-width="1.2"/>
    <!-- Button labels -->
    <text x="55" y="-14" font-family="Arial, sans-serif" font-size="7" fill="#a855f7" text-anchor="middle">Y</text>
    <text x="73" y="-1" font-family="Arial, sans-serif" font-size="7" fill="#7c3aed" text-anchor="middle">B</text>
    <text x="37" y="-1" font-family="Arial, sans-serif" font-size="7" fill="#7c3aed" text-anchor="middle">X</text>
    <text x="55" y="12" font-family="Arial, sans-serif" font-size="7" fill="#a855f7" text-anchor="middle">A</text>
    <!-- Analog sticks -->
    <circle cx="-35" cy="18" r="14" fill="#0a0a0a" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
    <circle cx="-35" cy="18" r="8" fill="#1a1a2e" stroke="#7c3aed" stroke-width="0.5"/>
    <circle cx="25" cy="30" r="14" fill="#0a0a0a" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
    <circle cx="25" cy="30" r="8" fill="#1a1a2e" stroke="#7c3aed" stroke-width="0.5"/>
    <!-- Center buttons -->
    <rect x="-12" y="-8" width="8" height="5" rx="2" fill="#7c3aed" opacity="0.4"/>
    <rect x="4" y="-8" width="8" height="5" rx="2" fill="#7c3aed" opacity="0.4"/>
    <!-- Center logo -->
    <circle cx="0" cy="-22" r="6" fill="#7c3aed" opacity="0.3"/>
    <circle cx="0" cy="-22" r="3" fill="#7c3aed" opacity="0.6"/>
  </g>
  <!-- Glow behind controller -->
  <ellipse cx="300" cy="200" rx="140" ry="80" fill="#7c3aed" opacity="0.04" filter="url(#glow-game)"/>
  <!-- Score/UI elements floating -->
  <g opacity="0.3">
    <text x="80" y="180" font-family="Consolas, monospace" font-size="10" fill="#7c3aed">SCORE: 9999</text>
    <text x="440" y="180" font-family="Consolas, monospace" font-size="10" fill="#a855f7">LEVEL 42</text>
    <rect x="440" y="185" width="80" height="4" rx="2" fill="#1a1a2e"/>
    <rect x="440" y="185" width="55" height="4" rx="2" fill="#7c3aed" opacity="0.5"/>
  </g>
  <!-- Diamond shapes -->
  <polygon points="300,30 310,45 300,60 290,45" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.2"/>
  <polygon points="300,33 307,45 300,57 293,45" fill="#7c3aed" opacity="0.05"/>
  <!-- Project name -->
  <text x="300" y="375" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.4" text-anchor="middle" letter-spacing="3">Web &amp; Mobile Game</text>
</svg>